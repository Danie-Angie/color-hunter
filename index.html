<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Hunter - Version Finale</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

h1{
    margin-top:20px;
}

#info{
    margin:10px;
}

#grid{
    display:grid;
    gap:10px;
    margin-top:20px;
}

.cell{
    width: calc(50px + 5 * var(--grid-size));
    height: calc(50px + 5 * var(--grid-size));
    cursor:pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
}

.cell:hover{
    transform:scale(1.05);
}

button{
    margin-top:20px;
    padding:10px 20px;
    border:none;
    border-radius:8px;
    background:#00c3ff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

/* Particles */
.particle{
    position:absolute;
    width:6px;
    height:6px;
    border-radius:50%;
    pointer-events:none;
}
</style>
</head>

<body>

<h1>🎨 Color Hunter</h1>
<div id="info">
Niveau : <span id="level">1</span> |
Score : <span id="score">0</span>
</div>

<div id="grid"></div>

<button onclick="startGame()">Rejouer</button>

<script>
let level = 1;
let score = 0;
let gridSize = 3;

function randomColor(modifier=0){
    let r = Math.min(255, Math.max(0, Math.floor(Math.random()*256)+modifier));
    let g = Math.min(255, Math.max(0, Math.floor(Math.random()*256)+modifier));
    let b = Math.min(255, Math.max(0, Math.floor(Math.random()*256)+modifier));
    return {r,g,b};
}

function startGame(){
    // Mettre à jour la taille des cases
    document.documentElement.style.setProperty('--grid-size', gridSize);

    document.getElementById("grid").innerHTML="";
    document.getElementById("level").textContent=level;
    document.getElementById("score").textContent=score;

    if(level % 5 === 0 && gridSize < 6){
        gridSize++;
    }

    const grid = document.getElementById("grid");
    grid.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;

    // Choisir un thème selon le niveau
    let themeIndex = Math.min(Math.floor(level/5), themes.length-1);
    let theme = themes[themeIndex];

    let baseColor = randomColor(theme.modifier);
    let diff = Math.max(50 - level*4, 5); // difficulté augmente plus vite

    let specialIndex = Math.floor(Math.random() * (gridSize*gridSize));

    for(let i=0;i<gridSize*gridSize;i++){
        let cell = document.createElement("div");
        cell.classList.add("cell");

        // Définir la couleur
        if(i === specialIndex){
            let specialColor = {
                r: Math.min(255, baseColor.r + diff),
                g: Math.min(255, baseColor.g + diff),
                b: Math.min(255, baseColor.b + diff)
            };
            cell.style.backgroundColor = `rgb(${specialColor.r}, ${specialColor.g}, ${specialColor.b})`;
            cell.onclick = ()=>win(cell);
        }else{
            cell.style.backgroundColor = `rgb(${baseColor.r}, ${baseColor.g}, ${baseColor.b})`;
            cell.onclick = ()=>lose();
        }

        // Définir la forme selon le niveau
        if(level % 5 === 0){
            cell.style.borderRadius = '25%'; // ovale
        }else if(level % 3 === 0){
            cell.style.borderRadius = '50%'; // rond
        }else{
            cell.style.borderRadius = '12px'; // carré
        }

        grid.appendChild(cell);
    }
}

// Animations de particules
function createParticles(x,y){
    for(let i=0;i<10;i++){
        let p = document.createElement("div");
        p.classList.add("particle");
        p.style.backgroundColor = `hsl(${Math.random()*360},100%,50%)`;
        p.style.left = x + "px";
        p.style.top = y + "px";
        document.body.appendChild(p);

        let dx = (Math.random()-0.5)*100;
        let dy = (Math.random()-0.5)*100;
        let scale = Math.random()*1.5 + 0.5;

        p.animate([
            {transform:`translate(0px,0px) scale(1)`, opacity:1},
            {transform:`translate(${dx}px,${dy}px) scale(${scale})`, opacity:0}
        ],{
            duration:600,
            easing:'ease-out'
        });

        setTimeout(()=>p.remove(),600);
    }
}

function win(cell){
    score += 10;
    level++;
    let rect = cell.getBoundingClientRect();
    createParticles(rect.left + rect.width/2, rect.top + rect.height/2);
    startGame();
}

function lose(){
    alert("❌ Mauvaise case ! Game Over. Ton score : " + score);
    level = 1;
    score = 0;
    gridSize = 3;
   const themes = [
    {name:"Standard", modifier:0},
    {name:"Pastel", modifier:60},
    {name:"Néon", modifier:120},
    {name:"Nature", modifier:-30},
    {name:"Nuit", modifier:-80}
]; 
    startGame();
}

startGame();
</script>

</body>
</html>
